<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>e-Security | ลงเวลาปฏิบัติหน้าที่</title>
    <link rel="stylesheet" href="style.css">
    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>กำลังโหลด...</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="container" style="display:none;">
        <header>
            <h1>ลงเวลาปฏิบัติหน้าที่</h1>
            <div id="userInfo" class="user-info"></div>
        </header>

        <form id="dutyForm" class="duty-form">
            <!-- ผลัดทำงาน -->
            <div class="form-group">
                <label>ผลัดทำงาน</label>
                <div class="toggle-group">
                    <label class="toggle-option active">
                        <input type="radio" name="shift" value="กลางวัน" checked>
                        <span>กลางวัน</span>
                    </label>
                    <label class="toggle-option">
                        <input type="radio" name="shift" value="กลางคืน">
                        <span>กลางคืน</span>
                    </label>
                </div>
            </div>

            <!-- จุดประจำการ -->
            <div class="form-group">
                <label for="dutyPoint">จุดประจำการ</label>
                <select id="dutyPoint" class="form-control" required></select>
            </div>

            <!-- หมายเหตุ -->
            <div class="form-group">
                <label for="note">หมายเหตุ</label>
                <textarea id="note" class="form-control" rows="3" placeholder="ระบุเพิ่มเติม (ถ้ามี)"></textarea>
            </div>

            <!-- ปุ่มบันทึก -->
            <button type="button" id="saveBtn" class="btn-primary">บันทึก</button>
        </form>
    </div>

    <!-- JavaScript Modules -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/liff.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
