<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>e-Security - ลงเวลา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        wvo: {
                            green: { 50: '#f0f9f4', 100: '#d4edda', 500: '#1b5e20', 600: '#154a19', 700: '#0f3712', 800: '#0a260c', 900: '#051406' },
                            orange: { 500: '#e65100', 600: '#bf360c' },
                            gold: { 400: '#fbc02d', 500: '#f57f17' }
                        }
                    },
                    fontFamily: { sans: ['Inter', 'Sarabun', 'sans-serif'] },
                    borderRadius: { xl: '0.75rem', '2xl': '1rem' }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
        }

        .theme-transition {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease;
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
    </style>
</head>

<body class="bg-[#F0F9F4] dark:bg-[#1A2E1A] min-h-screen theme-transition flex flex-col safe-bottom">

    <!-- Header (compact) -->
    <header id="site-header"
        class="bg-white dark:bg-[#1E3A1E] shadow-sm border-b border-emerald-100 dark:border-emerald-900 py-3 px-4 theme-transition">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="p-1.5 bg-emerald-50 rounded-lg text-emerald-600 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-600" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path
                            d="M12 22C17.1761 20.668 21 15.968 21 10.378V4.378L12 1.378L3 4.378V10.378C3 15.968 6.8239 20.668 12 22Z"
                            fill="#1b5e20" />
                        <path
                            d="M12 20.4C16.14 19.33 19.2 15.57 19.2 11.1V6.3L12 3.9L4.8 6.3V11.1C4.8 15.57 7.86 19.33 12 20.4Z"
                            fill="none" stroke="#fbc02d" stroke-width="1.2" />
                        <circle cx="12" cy="12" r="3.5" fill="#e65100" />
                        <circle cx="12" cy="12" r="1.5" fill="#fbc02d" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-emerald-800 dark:text-white leading-tight theme-transition">รปภ.
                        อผศ.</h1>
                    <div id="userInfo" class="flex items-center space-x-1 mt-0.5">
                        <img id="user-avatar" src="" class="w-4 h-4 rounded-full border border-emerald-400 hidden"
                            alt="">
                        <p id="user-welcome"
                            class="text-[9px] text-slate-500 dark:text-emerald-200 font-semibold truncate max-w-[120px] theme-transition">
                            กำลังโหลด...</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <div id="gps-indicator" class="flex items-center space-x-1 text-[10px] font-semibold hidden">
                    <span id="gps-dot" class="relative flex h-2 w-2">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                    </span>
                    <span id="gps-label" class="text-slate-500 dark:text-emerald-200">GPS</span>
                </div>
                <div class="text-right hidden sm:block">
                    <div id="live-date" class="text-xs font-semibold text-slate-700 dark:text-white theme-transition">
                    </div>
                    <div id="live-clock" class="text-[10px] text-emerald-600 dark:text-emerald-400 font-medium"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main id="app" class="max-w-sm w-full mx-auto px-3 pt-3 pb-4 flex-grow flex flex-col" style="display:none;">
        <div id="dutyForm"
            class="bg-white dark:bg-[#1E3A1E] rounded-2xl shadow-lg dark:shadow-2xl border border-emerald-100/50 dark:border-emerald-900 px-4 py-4 theme-transition">

            <form id="duty-form" onsubmit="event.preventDefault();">
                <!-- 1. Shift -->
                <div class="mb-4">
                    <span
                        class="block text-xs font-semibold text-slate-600 dark:text-slate-300 mb-1.5 theme-transition">ผลัด
                        <span class="text-red-500">*</span></span>
                    <div class="bg-slate-100 dark:bg-emerald-950 p-1 rounded-xl flex relative">
                        <label
                            class="w-1/2 flex items-center justify-center py-2 rounded-lg cursor-pointer z-10 transition-all duration-300"
                            id="label-day">
                            <input type="radio" name="shift" value="กลางวัน" checked class="sr-only">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1 text-orange-500" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 12.728A9 9 0 115.636 5.636m12.728 12.728L12 12" />
                            </svg>
                            <span class="text-xs font-bold text-emerald-700" id="text-day">กลางวัน</span>
                        </label>
                        <label
                            class="w-1/2 flex items-center justify-center py-2 rounded-lg cursor-pointer z-10 transition-all duration-300"
                            id="label-night">
                            <input type="radio" name="shift" value="กลางคืน" class="sr-only">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1 text-slate-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                            </svg>
                            <span class="text-xs font-semibold text-slate-500" id="text-night">กลางคืน</span>
                        </label>
                        <div id="toggle-bg"
                            class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white dark:bg-emerald-900 rounded-lg shadow-sm transition-all duration-300 ease-out">
                        </div>
                    </div>
                    <div class="mt-1 text-right">
                        <span id="shift-time-desc"
                            class="text-[10px] text-orange-600 font-semibold bg-orange-50 px-2 py-0.5 rounded-md">07:00
                            - 19:00 น.</span>
                    </div>
                </div>

                <!-- 2. Duty Point -->
                <div class="mb-4">
                    <label for="dutyPoint"
                        class="block text-xs font-semibold text-slate-600 dark:text-slate-300 mb-1.5 theme-transition">จุดตรวจ
                        <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <select id="dutyPoint" required
                            class="w-full px-3 py-2.5 bg-white dark:bg-emerald-900 border border-slate-200 dark:border-emerald-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition appearance-none text-sm text-slate-800 dark:text-white theme-transition">
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500">
                            <svg class="fill-current h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- 3. Note -->
                <div class="mb-4">
                    <label for="note"
                        class="block text-xs font-semibold text-slate-600 dark:text-slate-300 mb-1.5 theme-transition">หมายเหตุ</label>
                    <textarea id="note" rows="1" placeholder="เพิ่มเติม..."
                        class="w-full px-3 py-2 bg-white dark:bg-emerald-900 border border-slate-200 dark:border-emerald-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-sm text-slate-800 dark:text-white theme-transition placeholder-slate-400 dark:placeholder-emerald-200/50 resize-none"></textarea>
                </div>

                <!-- 4. Submit -->
                <button type="button" id="saveBtn"
                    class="w-full py-3.5 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-bold rounded-xl shadow-md hover:from-emerald-600 hover:to-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-200 dark:focus:ring-emerald-800 transform active:scale-[0.98] transition duration-150 flex items-center justify-center space-x-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                    <span>ส่งรายงาน</span>
                </button>
            </form>

            <!-- History -->
            <div id="history-section" class="mt-4 border-t border-slate-100 dark:border-emerald-800/50 pt-3 hidden">
                <h3
                    class="text-xs font-bold text-slate-700 dark:text-slate-200 mb-2 theme-transition flex items-center space-x-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-emerald-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span>ประวัติ</span>
                </h3>
                <div id="history-container" class="space-y-1.5 max-h-[160px] overflow-y-auto pr-1">
                    <p class="text-[10px] text-slate-400 text-center py-3">กำลังโหลด...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer-text"
        class="text-center py-2 text-[10px] text-emerald-700/50 dark:text-emerald-200/50 font-medium theme-transition safe-bottom">
        &copy; 2026 ระบบรักษาความปลอดภัย อผศ.
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/liff.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/common.js"></script>
    <script src="js/duty.js"></script>
</body>

</html>
